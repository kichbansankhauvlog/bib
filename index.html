<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tìm Ảnh Giải Chạy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e63946; --dark: #1d3557; --light: #f1faee; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fafafa; margin: 0; overflow-x: hidden; }
        
        header { background: var(--dark); color: white; padding: 30px 15px; text-align: center; sticky: top; }
        .search-box { position: relative; max-width: 500px; margin: 20px auto 0; }
        input { 
            width: 100%; padding: 15px 25px; border-radius: 50px; border: none; 
            font-size: 18px; outline: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Giao diện ô lưới (Grid) */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 15px; padding: 20px; max-width: 1400px; margin: 0 auto; 
        }
        .thumb-item { 
            position: relative; aspect-ratio: 1/1; overflow: hidden; 
            border-radius: 8px; cursor: pointer; background: #eee;
        }
        .thumb-item img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: 0.3s; 
        }
        .thumb-item:hover img { transform: scale(1.05); }

        /* Popup (Lightbox) */
        .popup { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; z-index: 1000;
            justify-content: center; align-items: center; 
        }
        .popup-content { position: relative; max-width: 90%; max-height: 90%; text-align: center; }
        .popup-content img { max-width: 100%; max-height: 80vh; border-radius: 5px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            color: white; font-size: 40px; cursor: pointer; padding: 20px; 
            transition: 0.3s; user-select: none;
        }
        .nav-btn:hover { color: var(--primary); }
        .prev { left: -80px; }
        .next { right: -80px; }

        .close-btn { position: absolute; top: -50px; right: 0; color: white; font-size: 30px; cursor: pointer; }
        
        /* Nút tải xuống Icon ⬇️ */
        .download-icon-btn { 
            margin-top: 15px; display: inline-block; background: var(--primary); 
            color: white; padding: 12px 25px; border-radius: 30px; 
            text-decoration: none; font-weight: bold; font-size: 18px;
        }
        .download-icon-btn i { margin-right: 8px; }

        @media (max-width: 768px) {
            .nav-btn { padding: 10px; font-size: 30px; }
            .prev { left: 5px; } .next { right: 5px; }
            .gallery { grid-template-columns: repeat(2, 1fr); padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <h1>HÌNH ẢNH CỦA BẠN</h1>
    <div class="search-box">
        <input type="text" id="bibSearch" placeholder="Nhập số BIB..." onkeyup="handleSearch(event)">
    </div>
</header>

<div class="gallery" id="imageGallery"></div>

<div id="photoPopup" class="popup">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()"><i class="fas fa-times"></i></span>
        <span class="nav-btn prev" onclick="changeImage(-1)"><i class="fas fa-chevron-left"></i></span>
        <img id="popupImg" src="" alt="Full size">
        <span class="nav-btn next" onclick="changeImage(1)"><i class="fas fa-chevron-right"></i></span>
        <br>
        <a id="downloadBtn" href="" class="download-icon-btn" download><i class="fas fa-cloud-download-alt"></i> TẢI ẢNH</a>
    </div>
</div>

<script>
    let allPhotos = [];
    let currentFiltered = [];
    let currentIndex = 0;

    // 1. Load dữ liệu
    fetch('data.json')
        .then(res => res.json())
        .then(data => { allPhotos = data; })
        .catch(err => alert("Chưa có file data.json hoặc lỗi file!"));

    // 2. Hàm tìm kiếm (Tự động hoặc Enter)
    function handleSearch(event) {
        const val = event.target.value.trim();
        if (val.length >= 2 || event.key === "Enter") {
            searchBIB(val);
        } else if (val === "") {
            document.getElementById('imageGallery').innerHTML = "";
        }
    }

    function searchBIB(query) {
        currentFiltered = allPhotos.filter(p => p.bibs.some(b => b.includes(query)));
        renderGallery(currentFiltered);
    }

    // 3. Render ảnh ra ô lưới
    function renderGallery(data) {
        const container = document.getElementById('imageGallery');
        container.innerHTML = data.map((item, index) => `
            <div class="thumb-item" onclick="openPopup(${index})">
                <img src="https://lh3.googleusercontent.com/d/${item.drive_id}=s500" loading="lazy">
            </div>
        `).join('');
    }

    // 4. Popup & Di chuyển ảnh
    function openPopup(index) {
        currentIndex = index;
        const item = currentFiltered[currentIndex];
        const fullUrl = `https://lh3.googleusercontent.com/d/${item.drive_id}=s0`; // s0 để lấy ảnh gốc nét nhất
        
        document.getElementById('popupImg').src = fullUrl;
        document.getElementById('downloadBtn').href = fullUrl;
        document.getElementById('photoPopup').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Khóa cuộn trang
    }

    function closePopup() {
        document.getElementById('photoPopup').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function changeImage(step) {
        currentIndex += step;
        if (currentIndex >= currentFiltered.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = currentFiltered.length - 1;
        openPopup(currentIndex);
    }

    // Đóng popup khi bấm ra ngoài ảnh
    window.onclick = function(event) {
        if (event.target == document.getElementById('photoPopup')) closePopup();
    }
</script>

</body>
</html>
